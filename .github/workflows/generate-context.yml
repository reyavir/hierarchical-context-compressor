name: Generate Hierarchical Context Map

on:
  push:
    branches:
      - main

jobs:
  generate-context:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Generate hierarchical context
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd hierarchical-context-compressor
          python -m src.main --root ..

      - name: Commit and push context files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add llms.txt ":(glob)**/agents.md" || true
          if git diff --cached --quiet; then
            echo "No context changes to commit."
            exit 0
          fi
          git commit -m "chore: update hierarchical context maps"
          git push

